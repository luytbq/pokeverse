<section class="max-w-7xl mx-auto px-4 py-6">
  <header class="mb-6">
    <h1 class="text-3xl font-bold text-gray-800">Search &amp; Filter</h1>
    <p class="text-sm text-gray-500 mt-1">
      Find Pokémon by name, type (up to 2), or generation.
    </p>
  </header>

  <form [formGroup]="form" class="bg-white rounded-2xl shadow-md p-5 mb-6 border border-gray-100">
    <div class="grid gap-4 md:grid-cols-2">
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase">
          Name
        </label>
        <input
          type="text"
          formControlName="name"
          placeholder="e.g. pikachu"
          class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase">
          Generation
        </label>
        <select
          formControlName="generation"
          class="w-full px-3 py-2 rounded-lg border border-gray-300 bg-white focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
          <option [ngValue]="null">All generations</option>
          <option *ngFor="let g of generations" [ngValue]="g.id">
            {{ g.name }}
          </option>
        </select>
      </div>
    </div>

    <div class="mt-4">
      <label class="block text-xs font-semibold text-gray-600 mb-2 uppercase">
        Types ({{ selectedTypes().length }}/2)
      </label>
      <div class="flex flex-wrap gap-2">
        <button
          *ngFor="let t of allTypes"
          type="button"
          (click)="toggleType(t)"
          [disabled]="isTypeDisabled(t)"
          class="px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wide border transition-all"
          [class.border-gray-900]="isTypeSelected(t)"
          [class.ring-2]="isTypeSelected(t)"
          [class.ring-offset-1]="isTypeSelected(t)"
          [class.opacity-40]="isTypeDisabled(t)"
          [class.cursor-not-allowed]="isTypeDisabled(t)"
          [ngClass]="typeBadgeClass(t)"
        >
          {{ t }}
        </button>
      </div>
    </div>

    <div class="mt-5 flex justify-end">
      <button
        type="button"
        (click)="reset()"
        class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 text-sm font-medium"
      >
        Reset
      </button>
    </div>
  </form>

  <div *ngIf="loading()" class="text-center text-gray-500 py-10">
    Searching...
  </div>

  <div *ngIf="error()" class="text-center text-red-600 py-4">
    {{ error() }}
  </div>

  <ng-container *ngIf="!loading() && searched()">
    <div class="flex items-center justify-between mb-4">
      <p class="text-sm text-gray-600">
        <span class="font-semibold text-gray-900">{{ results().length }}</span>
        result(s) found
      </p>
    </div>

    <div
      *ngIf="results().length > 0; else noResults"
      class="grid gap-4 grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6"
    >
      <app-pokemon-card
        *ngFor="let p of results(); trackBy: trackById"
        [pokemon]="p"
        [isFavorite]="isFavorite(p.id)"
        [teamFull]="teamFull()"
        [inTeam]="isInTeam(p.id)"
        (cardClick)="onCardClick(p)"
        (addToFavorites)="onAddToFavorites(p)"
        (addToTeam)="onAddToTeam(p)"
      ></app-pokemon-card>
    </div>

    <ng-template #noResults>
      <div class="text-center text-gray-500 py-12">
        <p class="text-lg font-semibold mb-1">Not found</p>
        <p class="text-sm">
          No Pokémon match your filters. Try adjusting your search.
        </p>
      </div>
    </ng-template>
  </ng-container>

  <div *ngIf="!searched() && !loading()" class="text-center text-gray-400 py-12">
    <p class="text-sm">Start typing a name, pick a type, or choose a generation.</p>
  </div>
</section>
