<div class="max-w-7xl mx-auto px-4 py-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
    <div>
      <h1 class="text-3xl font-bold text-gray-800">Favorites</h1>
      <p class="text-sm text-gray-500 mt-1">
        {{ count() }} Pokémon in your favorites list
      </p>
    </div>
    <button
      type="button"
      class="self-start sm:self-auto inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-red-500 text-white text-sm font-medium hover:bg-red-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      [disabled]="isEmpty()"
      (click)="onClearAll()"
    >
      Clear All
    </button>
  </div>

  <!-- Error -->
  <div
    *ngIf="error() as err"
    class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm"
  >
    {{ err }}
  </div>

  <!-- Empty state -->
  <div
    *ngIf="isEmpty() && !loading()"
    class="flex flex-col items-center justify-center py-20 text-center"
  >
    <div class="text-6xl mb-4">&#9825;</div>
    <h2 class="text-xl font-semibold text-gray-700 mb-2">No favorites yet</h2>
    <p class="text-gray-500 max-w-md">
      Browse Pokémon and tap the heart icon to add them to your favorites.
    </p>
    <a
      routerLink="/"
      class="mt-6 inline-block px-5 py-2 bg-blue-500 text-white rounded-lg text-sm font-medium hover:bg-blue-600 transition-colors"
    >
      Browse Pokémon
    </a>
  </div>

  <!-- Loading skeleton -->
  <div
    *ngIf="loading() && pokemons().length === 0"
    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"
  >
    <div
      *ngFor="let _ of skeletonArr"
      class="h-64 rounded-2xl bg-gray-100 animate-pulse"
    ></div>
  </div>

  <!-- Grid -->
  <div
    *ngIf="pokemons().length > 0"
    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"
  >
    <div *ngFor="let p of pokemons(); trackBy: trackById" class="relative">
      <app-pokemon-card
        [pokemon]="p"
        [isFavorite]="true"
        [inTeam]="isInTeam(p.id)"
        [teamFull]="teamFull()"
        (cardClick)="onCardClick(p)"
        (addToFavorites)="onRemove(p)"
        (addToTeam)="onAddToTeam(p)"
      />
      <!-- Explicit Remove button overlay -->
      <button
        type="button"
        class="absolute top-2 left-2 z-10 px-2 py-1 bg-white/90 backdrop-blur-sm border border-red-400 text-red-500 text-xs font-semibold rounded-md shadow-sm hover:bg-red-500 hover:text-white transition-colors"
        [attr.aria-label]="'Remove ' + p.name + ' from favorites'"
        (click)="onRemove(p); $event.stopPropagation()"
      >
        Remove
      </button>
    </div>
  </div>
</div>
