<span
  class="ability relative inline-flex items-center gap-1 px-2 py-1 rounded bg-gray-100 text-sm capitalize cursor-help"
  [class.border]="isHidden"
  [class.border-dashed]="isHidden"
  [class.border-purple-400]="isHidden"
  (mouseenter)="onEnter()"
  (mouseleave)="onLeave()"
  (focusin)="onEnter()"
  (focusout)="onLeave()"
  tabindex="0"
>
  {{ displayName }}
  @if (isHidden) {
    <span class="text-[10px] text-purple-600 uppercase">hidden</span>
  }

  @if (hovered()) {
    <span
      class="tooltip absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-56 p-2 rounded bg-gray-900 text-white text-xs shadow-lg z-20"
    >
      {{ description() }}
      <span
        class="absolute top-full left-1/2 -translate-x-1/2 w-0 h-0 border-l-4 border-r-4 border-t-4 border-l-transparent border-r-transparent border-t-gray-900"
      ></span>
    </span>
  }
</span>
